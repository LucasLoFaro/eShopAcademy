<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /></head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
  <div style="max-width: 600px; margin: auto; background: #fff; border-radius: 8px; overflow: hidden;">
    <div style="background-color: #673AB7; color: #fff; padding: 20px; text-align: center;">
      <h1 style="margin: 0;">Your Order Has Shipped</h1>
    </div>
    <div style="padding: 30px;">
      <p>Hi <strong>{{CustomerName}}</strong>,</p>
      <p>Your order <strong>#{{OrderNumber}}</strong> is on its way!</p>
      <table style="width: 100%; border-collapse: collapse; margin: 15px 0;">
        <tr>
          <td style="padding: 8px; border-bottom: 1px solid #eee; color: #666;">Carrier</td>
          <td style="padding: 8px; border-bottom: 1px solid #eee;"><strong>{{Carrier}}</strong></td>
        </tr>
        <tr>
          <td style="padding: 8px; border-bottom: 1px solid #eee; color: #666;">Tracking Number</td>
          <td style="padding: 8px; border-bottom: 1px solid #eee;"><strong>{{TrackingNumber}}</strong></td>
        </tr>
      </table>
      <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;" />
      <p style="color: #888; font-size: 12px;">eShopAcademy &mdash; {{Date}}</p>
    </div>
  </div>
</body>
</html>
