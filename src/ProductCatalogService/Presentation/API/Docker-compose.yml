version: '3.8'

services:
  api:
    build: ./Dockerfile-api
    ports:
      - "8080:80"  # Map port 8080 on host to port 80 in the container
    depends_on:
      - cassandra

  cassandra:
    build: ./Dockerfile-cassandra
    ports:
      - "9042:9042"  # Map port 9042 on host to port 9042 in the container