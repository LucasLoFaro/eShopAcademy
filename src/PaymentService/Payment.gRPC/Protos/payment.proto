syntax = "proto3";

option csharp_namespace = "Protos";

package payments;

service PaymentGrpc {
  rpc Initiate (InitiatePaymentRequest) returns (InitiatePaymentResponse);
}

message InitiatePaymentRequest {
  string order_id = 1;
  string amount = 2;
  string currency = 3;
  string notification_url = 4;
}

message InitiatePaymentResponse {
  string id = 1;
  string external_id = 2;
  string amount = 3;
  string currency = 4;
  string status = 5;
  string url = 6;
}