version: "3.5"

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - eshopnet
    volumes: 
      - rabbitmq:/var/lib/rabbitmq

networks:
  eshopnet:
    name: eshopnet-network

volumes:
  rabbitmq:
    driver: local