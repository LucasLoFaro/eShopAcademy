version: '3.4'

services:

  cassandra:
    build:
      context: .
      dockerfile: ProductCatalogService\Infrastructure\Data\docker\cassandra\Dockerfile
    ports:
      - "9042:9042"
    networks:
      - my-network
  api:

    image: ${DOCKER_REGISTRY-}api
    build:
      context: .
      dockerfile: ProductCatalogService/Presentation/API/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
     - cassandra
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - products__Database__Host=127.0.0.1:9042
      - products__Database__Keyspace=products_keyspace
      - Uris__BlobStorageUri=https://www.uri.com
    networks:
      - my-network
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - my-network

networks:
  my-network:
    driver: bridge
