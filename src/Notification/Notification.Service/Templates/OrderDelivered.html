<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /></head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
  <div style="max-width: 600px; margin: auto; background: #fff; border-radius: 8px; overflow: hidden;">
    <div style="background-color: #4CAF50; color: #fff; padding: 20px; text-align: center;">
      <h1 style="margin: 0;">Order Delivered</h1>
    </div>
    <div style="padding: 30px;">
      <p>Hi <strong>{{CustomerName}}</strong>,</p>
      <p>Your order <strong>#{{OrderNumber}}</strong> has been delivered. We hope you enjoy your purchase!</p>
      <p>If you have any questions, feel free to reach out to our support team.</p>
      <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;" />
      <p style="color: #888; font-size: 12px;">eShopAcademy &mdash; {{Date}}</p>
    </div>
  </div>
</body>
</html>
