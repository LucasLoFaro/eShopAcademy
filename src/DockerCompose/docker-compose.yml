# Basket Service
  basket-api:
    container_name: basket-api
    image: basket-api
    build:
      context: ..
      dockerfile: BasketService/API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - KEYVAULT=eshopacademy
      - APPCONFIGURATION=eshopacademy
      - AZURE_CLIENT_ID=3bef33a0-5cd1-49b3-ab3b-2291145e3f2c
      - AZURE_CLIENT_SECRET=DQe8Q~K8gDgM3vHpokpgrW3lD8au~igTkZQCxape
      - AZURE_TENANT_ID=82abd0e4-97e7-4ad4-9b49-4c93188625ed
    ports:
      - "8004:8080"
    networks:
      - backend
    depends_on:
      - basket-db

  basket-db:
    container_name: basket-db
    image: redis
    ports:
      - "8014:6379"
    networks:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
       
  basket-processor:
    container_name: basket-processor
    image: basket-processor
    build:
      context: ..
      dockerfile: BasketService/EventsProcessor/EventsProcessor/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Development
      - KEYVAULT=eshopacademy
      - APPCONFIGURATION=eshopacademy
      - AZURE_CLIENT_ID=3bef33a0-5cd1-49b3-ab3b-2291145e3f2c
      - AZURE_CLIENT_SECRET=DQe8Q~K8gDgM3vHpokpgrW3lD8au~igTkZQCxape
      - AZURE_TENANT_ID=82abd0e4-97e7-4ad4-9b49-4c93188625ed
    ports:
      - "8024:8080"
    networks:
      - backend
    depends_on:
      - basket-db


# Stock Service
  stock-api:
    container_name: stock-api
    image: stock-api
    build:
      context: ..
      dockerfile: StockService/API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - KEYVAULT=eshopacademy
      - APPCONFIGURATION=eshopacademy
      - AZURE_CLIENT_ID=f8414e0b-f3fc-417e-9579-dcf2522d012f
      - AZURE_CLIENT_SECRET=5ou8Q~aiomsSKzKOQo89Eg6O4uKInhC2rM3fncCW
      - AZURE_TENANT_ID=82abd0e4-97e7-4ad4-9b49-4c93188625ed
    ports:
      - "8002:8080"
    networks:
      - backend
    depends_on:
      - stock-db

  stock-db:
    container_name: stock-db
    image: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=Passw0rd
    networks:
      - backend
    volumes:
      - mongo_data:/data/db
    ports:
      - "8012:27017"
 
