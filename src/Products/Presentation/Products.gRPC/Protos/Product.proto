syntax = "proto3";

option csharp_namespace = "gRPC";

service ProductService {
  rpc GetProductById (ProductRequest) returns (ProductResponse);
}

message ProductRequest {
  string id = 1;
}

message ProductResponse {
  string id = 1;
  string name = 2;
  double price = 3;
  string description = 4;
  string image_url = 5;
  string category_id = 6;
  string seller_id = 7;
}
