syntax = "proto3";

option csharp_namespace = "gRPC";

service ProductService {
  rpc GetProductById (ProductRequest) returns (ProductResponse);
}

message ProductRequest {
  string id = 1;
}

message ProductResponse {
  string id = 1;
  string name = 2;
  float price = 3;
  string description = 4;
  string image = 5;
  string category_name = 6;
}