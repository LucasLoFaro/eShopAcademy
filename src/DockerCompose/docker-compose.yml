name: eshopacademy

services:

# Order Service
  order-api:
    container_name: order-api
    image: order-api
    build:
      context: ..
      dockerfile: OrderService/Presentation/API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - KEYVAULT=eshopacademy
      - APPCONFIGURATION=eshopacademy
      - AZURE_CLIENT_ID=31234358-e1e6-40e9-82fe-363a97801e4e
      - AZURE_CLIENT_SECRET=piI8Q~iaVPv30ukYTzBXKUi4FTaxoxglI4.Buapp
      - AZURE_TENANT_ID=82abd0e4-97e7-4ad4-9b49-4c93188625ed
    ports:
     - "8003:8080"
    networks:
     - backend
    depends_on:
     - order-db

  order-db:
    container_name: order-db
    image: postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=Passw0rd
    ports:
      - "8013:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend 


# Product Catalog Service
  product-api:
    container_name: product-api
    image: product-api
    build:
      context: ..
      dockerfile: ProductCatalogService/Presentation/API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - KEYVAULT=eshopacademy
      - APPCONFIGURATION=eshopacademy
      - AZURE_CLIENT_ID=facc151c-6753-4101-9035-e10cc34a38f3
      - AZURE_CLIENT_SECRET=Dsq8Q~D6TAdUK9VBKYM.M67LpDyZ_kS210.33cE3
      - AZURE_TENANT_ID=82abd0e4-97e7-4ad4-9b49-4c93188625ed
    ports:
      - "8001:8080"
    networks:
      - backend
    depends_on:
      - product-db
  
  product-db:
    container_name: product-db
    image: cassandra
    ports:
      - "8011:7000"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - backend

