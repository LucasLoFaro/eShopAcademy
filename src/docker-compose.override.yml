name: eshopacademy
version: '3.4'

services:

  product-api:
    container_name: product-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "8001:8080"
    networks:
      - backend
 
  product-db:
    container_name: product-db
    ports:
      - "8011:7000"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - backend

  product-grpc:
    container_name: product-grpc
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "8021:8080"
    networks:
      - backend

  basket-api:
    container_name: basket-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "8004:8080"
    networks:
      - backend

  basket-processor:
    container_name: basket-processor
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - REDIS_URL=basket-db:6379
    networks:
      - backend
      
  basket-db:
    container_name: basket-db
    networks:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  order-db:
    container_name: order-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=Passw0rd
    ports:
      - "8013:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
     
  rabbitmq:
    container_name: rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"
      - "5673:5673"
    networks:
      - backend
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq